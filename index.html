    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* buton metni seçilmesin, ama engel değil */
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            margin: 0;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .quiz-container {
            max-width: 780px;
            margin: 0 auto;
            background: rgba(255,255,255,0.96);
            border-radius: 48px 32px 48px 32px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
            overflow: hidden;
            backdrop-filter: blur(0px);
            transition: all 0.2s;
        }

        .quiz-header {
            background: #1e3c72;
            background: linear-gradient(135deg, #0b2b44, #123e6a);
            padding: 20px 28px;
            color: white;
            border-bottom: 5px solid #ffb347;
        }

        .quiz-header h1 {
            margin: 0;
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .quiz-header h1:before {
            content: "📄";
            font-size: 2rem;
        }

        .quiz-header p {
            margin: 8px 0 0;
            opacity: 0.85;
            font-weight: 500;
        }

        .quiz-card {
            padding: 25px 30px 30px;
        }

        .soru-metni {
            font-size: 1.55rem;
            font-weight: 600;
            line-height: 1.3;
            color: #0a2b3e;
            background: #f9fbfe;
            padding: 20px 24px;
            border-radius: 32px;
            box-shadow: inset 0 1px 3px #0001, 0 8px 20px -8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border-left: 8px solid #ffb347;
        }

        .siklar-alani {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }

        button.secenek-btn {
            background: #f1f5f9;
            border: 2px solid #cbd5e1;
            padding: 15px 20px;
            font-size: 1.05rem;
            font-weight: 500;
            text-align: left;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            color: #0c4a6e;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        button.secenek-btn:hover:not(.disabled-opt) {
            background: #e6edf6;
            border-color: #2c7da0;
            transform: scale(0.99);
        }

        /* doğru cevap stilleri */
        .dogru-cevap {
            background: #c8f0d1 !important;
            border: 3px solid #15803d !important;
            color: #14532d !important;
            font-weight: bold;
            position: relative;
        }

        .dogru-cevap::after {
            content: "✓";
            margin-left: auto;
            font-size: 1.6rem;
            font-weight: bold;
            color: #15803d;
        }

        .yanlis-cevap {
            background: #ffe2e2 !important;
            border: 3px solid #b91c1c !important;
            color: #991b1b !important;
            text-decoration: line-through;
            font-weight: bold;
        }

        .yanlis-cevap::after {
            content: "✗";
            margin-left: auto;
            font-size: 1.6rem;
            font-weight: bold;
            color: #b91c1c;
        }

        .disabled-opt {
            cursor: default;
            opacity: 0.95;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            background: #eef2ff;
            padding: 12px 20px;
            border-radius: 40px;
            margin: 20px 0 20px;
            font-weight: 600;
        }

        .skor {
            background: #0f3b5c;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1rem;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0 18px;
        }

        .nav-btn {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 12px 18px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            width: 45%;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-btn:hover {
            background: #1f2c4b;
            transform: translateY(-2px);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 12px 0 18px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            background: #ffb347;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            color: #2d2b1f;
        }

        .action-btn.outline {
            background: #e9ecef;
            color: #1e466e;
            border: 1px solid #adb5bd;
        }

        .action-btn:hover {
            filter: brightness(0.94);
            transform: scale(0.98);
        }

        .soru-git {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            align-items: center;
        }

        .soru-git input {
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            border: 1px solid #ccc;
            font-size: 1rem;
            text-align: center;
            font-weight: 500;
        }

        .soru-git button {
            background: #2c5282;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 18px;
            font-size: 0.75rem;
            background: #f1f5f9;
            color: #4b5563;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 550px) {
            .quiz-card {
                padding: 18px;
            }
            .soru-metni {
                font-size: 1.25rem;
                padding: 15px;
            }
            .secenek-btn {
                padding: 12px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<div class="quiz-container">
    <div class="quiz-header">
        <h1>Microsoft Word Quiz</h1>
        <p>📌 Kelime işlemci & belge düzenleme soruları | Toplam 20 soru</p>
    </div>
    <div class="quiz-card">
        <div class="soru-metni" id="soruText">

        </div>
        <div id="siklarAlani" class="siklar-alani"></div>

        <div class="info-panel">

        </div>

        <div class="nav-buttons">
            <button id="geriBtn" class="nav-btn">← Önceki</button>
            <button id="ileriBtn" class="nav-btn">Sonraki →</button>

        <div class="action-buttons">
            <button id="yanlisBtn" class="action-btn">❌ Yanlışları Tekrar Çöz</button>

            <input type="number" id="soruNoInput" min="1" max="20" placeholder="Soru no (1-20)">
            <button id="gitBtn">🚀 Git</button>
        </div>
    </div>
    <footer>Word becerilerini test et | Her soruda doğru şıkkı seç, ilerlemen kaydedilir.</footer>
</div>
