<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Word İşlemleri Quiz | Microsoft Word Testi</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* buton metni seçilmesin, ama engel değil */
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            margin: 0;
            padding: 24px 16px;
            min-height: 100vh;
        }

        .quiz-container {
            max-width: 780px;
            margin: 0 auto;
            background: rgba(255,255,255,0.96);
            border-radius: 48px 32px 48px 32px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.3);
            overflow: hidden;
            backdrop-filter: blur(0px);
            transition: all 0.2s;
        }

        .quiz-header {
            background: #1e3c72;
            background: linear-gradient(135deg, #0b2b44, #123e6a);
            padding: 20px 28px;
            color: white;
            border-bottom: 5px solid #ffb347;
        }

        .quiz-header h1 {
            margin: 0;
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .quiz-header h1:before {
            content: "📄";
            font-size: 2rem;
        }

        .quiz-header p {
            margin: 8px 0 0;
            opacity: 0.85;
            font-weight: 500;
        }

        .quiz-card {
            padding: 25px 30px 30px;
        }

        .soru-metni {
            font-size: 1.55rem;
            font-weight: 600;
            line-height: 1.3;
            color: #0a2b3e;
            background: #f9fbfe;
            padding: 20px 24px;
            border-radius: 32px;
            box-shadow: inset 0 1px 3px #0001, 0 8px 20px -8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            border-left: 8px solid #ffb347;
        }

        .siklar-alani {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }

        button.secenek-btn {
            background: #f1f5f9;
            border: 2px solid #cbd5e1;
            padding: 15px 20px;
            font-size: 1.05rem;
            font-weight: 500;
            text-align: left;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            color: #0c4a6e;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        button.secenek-btn:hover:not(.disabled-opt) {
            background: #e6edf6;
            border-color: #2c7da0;
            transform: scale(0.99);
        }

        /* doğru cevap stilleri */
        .dogru-cevap {
            background: #c8f0d1 !important;
            border: 3px solid #15803d !important;
            color: #14532d !important;
            font-weight: bold;
            position: relative;
        }

        .dogru-cevap::after {
            content: "✓";
            margin-left: auto;
            font-size: 1.6rem;
            font-weight: bold;
            color: #15803d;
        }

        .yanlis-cevap {
            background: #ffe2e2 !important;
            border: 3px solid #b91c1c !important;
            color: #991b1b !important;
            text-decoration: line-through;
            font-weight: bold;
        }

        .yanlis-cevap::after {
            content: "✗";
            margin-left: auto;
            font-size: 1.6rem;
            font-weight: bold;
            color: #b91c1c;
        }

        .disabled-opt {
            cursor: default;
            opacity: 0.95;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            background: #eef2ff;
            padding: 12px 20px;
            border-radius: 40px;
            margin: 20px 0 20px;
            font-weight: 600;
        }

        .skor {
            background: #0f3b5c;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 1rem;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0 18px;
        }

        .nav-btn {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 12px 18px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            width: 45%;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .nav-btn:hover {
            background: #1f2c4b;
            transform: translateY(-2px);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 12px 0 18px;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            background: #ffb347;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            color: #2d2b1f;
        }

        .action-btn.outline {
            background: #e9ecef;
            color: #1e466e;
            border: 1px solid #adb5bd;
        }

        .action-btn:hover {
            filter: brightness(0.94);
            transform: scale(0.98);
        }

        .soru-git {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            align-items: center;
        }

        .soru-git input {
            flex: 1;
            padding: 12px;
            border-radius: 50px;
            border: 1px solid #ccc;
            font-size: 1rem;
            text-align: center;
            font-weight: 500;
        }

        .soru-git button {
            background: #2c5282;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 18px;
            font-size: 0.75rem;
            background: #f1f5f9;
            color: #4b5563;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 550px) {
            .quiz-card {
                padding: 18px;
            }
            .soru-metni {
                font-size: 1.25rem;
                padding: 15px;
            }
            .secenek-btn {
                padding: 12px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">
    <div class="quiz-header">
        <h1>Microsoft Word Quiz</h1>
        <p>📌 Kelime işlemci & belge düzenleme soruları | Toplam 20 soru</p>
    </div>
    <div class="quiz-card">
        <div class="soru-metni" id="soruText">
            1. İçindekiler Tablosu (Table of Contents) otomatik nasıl oluşturulur?
        </div>
        <div id="siklarAlani" class="siklar-alani"></div>

        <div class="info-panel">
            <span>📌 Soru <span id="soruIndex">1</span> / <span id="toplamSoru">20</span></span>
            <span class="skor" id="skorGosterge">Doğru: 0 / 20</span>
        </div>

        <div class="nav-buttons">
            <button id="geriBtn" class="nav-btn">← Önceki</button>
            <button id="ileriBtn" class="nav-btn">Sonraki →</button>
        </div>

        <div class="action-buttons">
            <button id="yanlisBtn" class="action-btn">❌ Yanlışları Tekrar Çöz</button>
            <button id="tumuneDonBtn" class="action-btn outline" style="display: none;">📚 Tüm Sorulara Dön</button>
        </div>

        <div class="soru-git">
            <input type="number" id="soruNoInput" min="1" max="20" placeholder="Soru no (1-20)">
            <button id="gitBtn">🚀 Git</button>
        </div>
    </div>
    <footer>Word becerilerini test et | Her soruda doğru şıkkı seç, ilerlemen kaydedilir.</footer>
</div>

<script>
    // ---------- WORD SORULARI (20 ADET) --------------
    const SORU_SETI = [
        { soru: "İçindekiler Tablosu (Table of Contents) otomatik nasıl oluşturulur?", siklar: ["Elle yazılarak", "Başlık stilleri kullanılarak", "Resim eklenerek", "Sayfa numarası eklenerek", "Yazım denetimi ile"], dogru: 1 },
        { soru: "Word'de şablon (template) kullanımının avantajı nedir?", siklar: ["Dosyayı küçültür", "Standart belge yapısı sağlar", "Yazım hatalarını otomatik düzeltir", "Bilgisayarı hızlandırır", "İnternet bağlantısı sağlar"], dogru: 1 },
        { soru: "Bir metni iki sütun halinde düzenlemek için hangi sekme kullanılır?", siklar: ["Ekle", "Tasarım", "Düzen (Layout)", "Gözden Geçir", "Görünüm"], dogru: 2 },
        { soru: "Paragrafın yalnızca ilk satırının içeriden başlamasını sağlayan ayar hangisidir?", siklar: ["Satır aralığı", "İlk satır girintisi", "Sağdan girinti", "Paragraf aralığı", "Metin kaydırma"], dogru: 1 },
        { soru: "Metin içinde numaralandırılmış açıklamaların sayfa altında gösterilmesi hangi özelliktir?", siklar: ["Üstbilgi", "Dipnot", "Sonnot", "Açıklama", "Referans"], dogru: 1 },
        { soru: "Her sayfanın üst kısmında tekrar eden metin alanı nedir?", siklar: ["Altbilgi", "Üstbilgi", "Metin kutusu", "Stil alanı", "Navigasyon paneli"], dogru: 1 },
        { soru: "Tablo kenarlıklarını düzenlemek için hangi sekme kullanılır?", siklar: ["Ekle", "Tablo Araçları – Tasarım", "Giriş", "Görünüm", "Dosya"], dogru: 1 },
        { soru: "Bir resmin etrafında metnin dolaşmasını sağlamak için hangi özellik kullanılır?", siklar: ["Metin kaydırma", "Paragraf ayarları", "Stil ayarları", "Yazı tipi", "Kenarlık"], dogru: 0 },
        { soru: "Word'de kırmızı dalgalı alt çizgi neyi ifade eder?", siklar: ["Dil hatası", "Yazım hatası", "Stil hatası", "Biçim hatası", "Paragraf hatası"], dogru: 1 },
        { soru: "Sayfa kenar boşluklarını değiştirmek için hangi sekme kullanılır?", siklar: ["Giriş", "Tasarım", "Düzen (Layout)", "Ekle", "Görünüm"], dogru: 2 },
        { soru: "Metin içinde başka bir sayfaya veya web sitesine yönlendiren bağlantıya ne ad verilir?", siklar: ["Yer imi", "Köprü (Hyperlink)", "Dipnot", "Stil", "Açıklama"], dogru: 1 },
        { soru: "Kalın, italik ve altı çizili gibi metin biçimlendirmeleri hangi sekmeden yapılır?", siklar: ["Ekle", "Giriş", "Tasarım", "Görünüm", "Dosya"], dogru: 1 },
        { soru: "Belgeye sayfa numarası eklemek için hangi yol izlenir?", siklar: ["Giriş → Hizalama", "Ekle → Sayfa Numarası", "Tasarım → Tema", "Görünüm → Araçlar", "Düzen → Girinti"], dogru: 1 },
        { soru: "Metnin arka planını renklendirerek vurgulamak için hangi özellik kullanılır?", siklar: ["Yazı rengi", "Metin vurgulama", "Stil uygulama", "Kenarlık", "Gölgelendirme"], dogru: 1 },
        { soru: "Belgede yapılan değişiklikleri izlemek için kullanılan özellik hangisidir?", siklar: ["Yorum ekleme", "Değişiklikleri izle", "Yazım denetimi", "Stil düzenleme", "Belge koruma"], dogru: 1 },
        { soru: "Metni sayfanın ortasına hizalamak hangi hizalama türüdür?", siklar: ["Sola hizalı", "Sağa hizalı", "İki yana yaslı", "Ortalanmış", "Dağıtılmış"], dogru: 3 },
        { soru: "Bir tabloya yeni satır eklemek için en doğru yöntem hangisidir?", siklar: ["Enter tuşu", "Tab tuşu", "Sağ tık → Satır ekle", "Ctrl+S", "Ctrl+P"], dogru: 2 },
        { soru: "Bir belgeyi PDF formatında kaydetmek için hangi menü kullanılır?", siklar: ["Giriş", "Ekle", "Dosya", "Tasarım", "Görünüm"], dogru: 2 },
        { soru: "Aynı belge içinde hem yatay hem dikey sayfa kullanabilmek için hangi işlem yapılmalıdır?", siklar: ["Sayfa sonu ekleme", "Bölüm sonu ekleme", "Enter tuşu kullanma", "Tab tuşu kullanma", "Stil değiştirme"], dogru: 1 },
        { soru: "Sayfa yönünü yatay yapmak için hangi sekme kullanılır?", siklar: ["Giriş", "Ekle", "Düzen (Layout)", "Gözden Geçir", "Görünüm"], dogru: 2 }
    ];

    // -------- UYGULAMA DURUMU ----------
    let sorular = [...SORU_SETI];          // aktif soru listesi (normal veya yanlış filtresi)
    let secimler = new Array(sorular.length).fill(null);   // her soru için kullanıcının seçtiği index
    let yanlisIndisler = [];               // orijinal SORU_SETI'ne göre yanlış yapılan soruların index'leri (global)
    let currentIndex = 0;                  // mevcut aktif listedeki sıra
    let yanlisModActive = false;            // yanlışlar modunda mıyız?

    // yardımcı: orijinal dizideki doğru sayısı (tüm sorular)
    function dogruSayisiOrijinal() {
        let dogru = 0;
        for (let i = 0; i < SORU_SETI.length; i++) {
            // secimler dizisi orijinal sıraya göre eşlenmeli? secimler sadece aktif soru listesine göre
            // daha sağlıklı: global bir cevaplar objesi tutalım, orijinal index bazlı.
        }
        // alternatif: tüm yanlışIndisler dışında kalanlar doğru
        let dogruAdet = SORU_SETI.length - yanlisIndisler.length;
        return dogruAdet;
    }

    // secimler dizisini (aktif soru listesine göre) orijinal referans ile doğru sayısını hesapla (global doğru)
    function guncelDogruSayisi() {
        // her bir orijinal soru için, eğer yanlışIndisler içinde yoksa ve secim yapılmışsa doğru kontrolü farklı.
        // en doğru: kullanıcının orijinal sorulara verdiği cevapları tutmak için map
        // çapraz karmaşayı önlemek için "kullaniciCevaplari" adında global dizi (orijinal soru sırası)
        if (typeof window.kullaniciCevaplari === 'undefined') {
            window.kullaniciCevaplari = new Array(SORU_SETI.length).fill(null);
        }
        let dogruCount = 0;
        for (let i = 0; i < SORU_SETI.length; i++) {
            let cevap = window.kullaniciCevaplari[i];
            if (cevap !== null && cevap === SORU_SETI[i].dogru) {
                dogruCount++;
            }
        }
        return dogruCount;
    }

    // cevap kaydetme (orijinal index üzerinden)
    function kaydetCevap(originalIndex, secilenSikIndex) {
        if (!window.kullaniciCevaplari) window.kullaniciCevaplari = new Array(SORU_SETI.length).fill(null);
        window.kullaniciCevaplari[originalIndex] = secilenSikIndex;
        // yanlış listesini güncelle: eğer doğru değilse ve daha önce eklenmemişse ekle, eğer düzeltilmişse çıkar
        const isDogru = (secilenSikIndex === SORU_SETI[originalIndex].dogru);
        const mevcutYanlisIndex = yanlisIndisler.indexOf(originalIndex);
        if (!isDogru && mevcutYanlisIndex === -1) {
            yanlisIndisler.push(originalIndex);
        } else if (isDogru && mevcutYanlisIndex !== -1) {
            yanlisIndisler.splice(mevcutYanlisIndex, 1);
        }
        // yanlış moddaysak ve yanlışlar listesi değiştiyse, eğer şu anki soru listede yoksa yanlış mod yeniden yüklenebilir.
        if (yanlisModActive) {
            // yanlış modundayken bir soruya cevap verdik, eğer doğru yaparsak artık yanlış listesinden çıktı,
            // ancak aktif soru listesini güncellemek gerekebilir. Fakat kullanıcıya hissettirmek için
            // "Yanlışları Tekrar Çöz" modunda cevap düzelince listeden kaybolmasını istiyorsak, sayfayı yenilemek gerek.
            // Basit çözüm: yanlış moddayken cevap değişince, eğer o soru artık yanlış değilse listeden çıkar, yeniden yükleyelim.
            if (!yanlisIndisler.includes(originalIndex)) {
                // Bu soru artık doğru, yanlış listesinden çıktı => yanlış moddaki aktif listeyi yeniden oluştur
                yanlisModundaListeyiGuncelle();
            }
        }
    }

    function yanlisModundaListeyiGuncelle() {
        if (!yanlisModActive) return;
        // yanlış indisler sıralı -> yeni sorular dizisi
        let yeniSoruListesi = yanlisIndisler.map(idx => SORU_SETI[idx]);
        sorular = yeniSoruListesi;
        // yeni secimler dizisi (null)
        let yeniSecimler = new Array(sorular.length).fill(null);
        // mevcut kullanıcının yanlış sorulara verdiği cevapları (orijinalden) al
        for (let i = 0; i < sorular.length; i++) {
            let originalIdx = yanlisIndisler[i];
            let cevap = window.kullaniciCevaplari[originalIdx];
            if (cevap !== undefined && cevap !== null) {
                yeniSecimler[i] = cevap;
            } else {
                yeniSecimler[i] = null;
            }
        }
        secimler = yeniSecimler;
        // currentIndex taşma kontrolü
        if (currentIndex >= sorular.length) currentIndex = Math.max(0, sorular.length - 1);
        if (sorular.length === 0) {
            // hiç yanlış kalmadıysa otomatik tüm moda dön?
            tumSorularaDon();
            return;
        }
        yukle();
    }

    function tumSorularaDon() {
        sorular = [...SORU_SETI];
        // secimleri global cevaplardan al
        let yeniSecimler = new Array(sorular.length).fill(null);
        for (let i = 0; i < sorular.length; i++) {
            let cev = window.kullaniciCevaplari[i];
            if (cev !== null && cev !== undefined) yeniSecimler[i] = cev;
            else yeniSecimler[i] = null;
        }
        secimler = yeniSecimler;
        yanlisModActive = false;
        currentIndex = 0;
        yukle();
    }

    // sayfayı güncelle
    function yukle() {
        if (!sorular.length) {
            document.getElementById("soruText").innerText = "🎉 Tebrikler! Tüm soruları doğru yanıtladınız!";
            document.getElementById("siklarAlani").innerHTML = "<div style='text-align:center; padding:20px'>✨ Mükemmel ✨</div>";
            document.getElementById("skorGosterge").innerText = `Doğru: ${guncelDogruSayisi()} / ${SORU_SETI.length}`;
            document.getElementById("tumuneDonBtn").style.display = yanlisModActive ? "block" : "none";
            return;
        }

        const mevcut = sorular[currentIndex];
        document.getElementById("soruText").innerHTML = `<span style="font-weight:700">${currentIndex+1}.</span> ${mevcut.soru}`;
        document.getElementById("soruIndex").innerText = currentIndex+1;
        document.getElementById("toplamSoru").innerText = sorular.length;
        const skor = guncelDogruSayisi();
        document.getElementById("skorGosterge").innerHTML = `✅ Doğru: ${skor} / ${SORU_SETI.length}`;

        const container = document.getElementById("siklarAlani");
        container.innerHTML = "";

        const secilenIndex = secimler[currentIndex];

        mevcut.siklar.forEach((sik, i) => {
            const btn = document.createElement("button");
            btn.innerText = `${String.fromCharCode(65+i)}) ${sik}`;  // A, B, C, D, E
            btn.classList.add("secenek-btn");

            const isDogruCevap = (i === mevcut.dogru);
            const isYanlisSecim = (secilenIndex === i && secilenIndex !== null && secilenIndex !== mevcut.dogru);

            if (secilenIndex !== null) {
                // cevap verilmiş durum: doğru şıkkı yeşil, yanlış yapılan şıkkı kırmızı
                if (isDogruCevap) {
                    btn.classList.add("dogru-cevap");
                }
                if (isYanlisSecim) {
                    btn.classList.add("yanlis-cevap");
                }
                btn.classList.add("disabled-opt");
                btn.style.cursor = "default";
            } else {
                // cevap verilmemiş, tıklanabilir
                btn.onclick = (function(secimIdx) {
                    return function() {
                        if (secimler[currentIndex] !== null) return;
                        // orijinal sorunun global index'ini bulalım (sorular[currentIndex]'nin orijinal setteki sırası)
                        let originalIndex = -1;
                        if (yanlisModActive) {
                            originalIndex = yanlisIndisler[currentIndex];
                        } else {
                            originalIndex = currentIndex;
                        }
                        // kaydet
                        secimler[currentIndex] = secimIdx;
                        kaydetCevap(originalIndex, secimIdx);
                        yukle();  // yeniden render
                    };
                })(i);
            }
            container.appendChild(btn);
        });

        // buton görünürlük
        document.getElementById("tumuneDonBtn").style.display = yanlisModActive ? "block" : "none";
    }

    // gezinti
    document.getElementById("geriBtn").onclick = () => {
        if (sorular.length && currentIndex > 0) {
            currentIndex--;
            yukle();
        } else if (sorular.length === 0) {
            tumSorularaDon();
        }
    };
    document.getElementById("ileriBtn").onclick = () => {
        if (sorular.length && currentIndex < sorular.length-1) {
            currentIndex++;
            yukle();
        } else if (sorular.length === 0) {
            tumSorularaDon();
        }
    };
    document.getElementById("gitBtn").onclick = () => {
        const girilen = parseInt(document.getElementById("soruNoInput").value);
        if (!isNaN(girilen) && girilen >= 1 && girilen <= sorular.length && sorular.length > 0) {
            currentIndex = girilen - 1;
            yukle();
        } else if (sorular.length === 0) {
            tumSorularaDon();
        }
    };
    document.getElementById("yanlisBtn").onclick = () => {
        if (yanlisIndisler.length === 0) {
            alert("Henüz hiç yanlış cevabınız yok! Tüm sorular doğru veya henüz cevaplanmamış.");
            return;
        }
        // yanlış moduna geç
        yanlisModActive = true;
        sorular = yanlisIndisler.map(idx => SORU_SETI[idx]);
        secimler = new Array(sorular.length).fill(null);
        // mevcut cevapları yükle (globalden)
        for (let i = 0; i < sorular.length; i++) {
            let origIdx = yanlisIndisler[i];
            let cev = window.kullaniciCevaplari[origIdx];
            if (cev !== undefined && cev !== null) secimler[i] = cev;
        }
        currentIndex = 0;
        yukle();
    };
    document.getElementById("tumuneDonBtn").onclick = () => {
        tumSorularaDon();
    };

    // başlangıç
    window.kullaniciCevaplari = new Array(SORU_SETI.length).fill(null);
    yanlisIndisler = [];
    sorular = [...SORU_SETI];
    secimler = new Array(sorular.length).fill(null);
    yanlisModActive = false;
    currentIndex = 0;
    yukle();
</script>
</body>
